<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shubho Nobo Borsho</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Noto Serif Bengali',serif;
background:#000;
overflow:hidden;
}

/* LANDING */
#landing{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)),
url("landing.jpg");

background-size:cover;
background-position:center;

color:white;
}

input{
margin-top:15px;
padding:10px;
border-radius:8px;
border:none;
text-align:center;
width:220px;
}

.startBtn{
margin-top:15px;
padding:12px 26px;
background:#b22222;
color:#fff;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

/* STORY */
#story{
display:none;
position:fixed;
inset:0;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,0.2),rgba(0,0,0,0.2)),
url("preview.jpg");

background-size:cover;
background-position:center;
}

/* CARD */
.card{
width:min(92vw,380px);
background:#fffaf0;
padding:22px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* GREETING TEXT */
.intro{
font-size:17px;
color:#000;
line-height:1.5;
margin-bottom:10px;
}

.eng{
font-size:14px;
color:#333;
}

/* ENVELOPE */
.envelope{
width:130px;
height:85px;
margin:18px auto;
background:linear-gradient(145deg,#9e1c1c,#b22222,#7a1212);
border-radius:6px;
position:relative;
cursor:pointer;
}

.envelope:before{
content:"";
position:absolute;
border-left:65px solid transparent;
border-right:65px solid transparent;
border-top:45px solid #7a1212;
top:0;
left:0;
transform-origin:top;
transition:1s;
}

.open:before{
transform:rotateX(180deg);
}

/* MESSAGES */
.msg{
opacity:0;
transform:translateY(10px);
transition:0.8s ease;
margin-top:10px;
font-size:18px;
color:#000;
}

.show{
opacity:1;
transform:translateY(0);
}

.final{
font-size:24px;
color:#b30000;
font-weight:700;
}

/* FLOWERS */
.flower{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>

</head>

<body>

<audio id="song" src="rabindra.mp3" loop></audio>

<!-- LANDING -->
<div id="landing">

<h2>নমস্কার<br>(Greetings)</h2>
<p>পয়লা বৈশাখের শুভেচ্ছা</p>

<input id="nameInput" type="text" placeholder="Enter your name">

<button class="startBtn" onclick="start()">Click Here</button>

</div>

<!-- STORY -->
<div id="story">

<div class="card">

<div class="intro">
নমস্কার প্রিয়জন<br>
<span class="eng">(Nomoshkaar Priyojon)</span><br><br>

বড়দেরকে প্রণাম, ছোটদেরকে ভালোবাসা<br>
<span class="eng">(Respect & love)</span><br><br>

চিঠিটিতে চাপ দিন<br>
<span class="eng">(Tap the letter)</span>
</div>

<div class="envelope" id="env" onclick="openLetter()"></div>

<div id="m1" class="msg">নতুন আলো আসুক জীবনে<br>(New light in life)</div>
<div id="m2" class="msg">হাসি আর ভালোবাসা থাকুক<br>(Happiness & love)</div>
<div id="m3" class="msg">স্বপ্নগুলো বড় হোক<br>(Bigger dreams)</div>

<div id="finalMsg" class="msg final"></div>

</div>

</div>

<script>

let song=document.getElementById("song");
let userName="প্রিয়জন";

/* START FUNCTION (FIXED) */
function start(){

let input=document.getElementById("nameInput");
if(input.value.trim()!==""){
userName=input.value.trim();
}

document.getElementById("landing").style.display="none";
document.getElementById("story").style.display="flex";

/* MUSIC FIX — ONLY AFTER CLICK */
song.currentTime = 42;
song.volume = 0.35;

let playPromise = song.play();

if(playPromise !== undefined){
playPromise.catch(()=>{
document.addEventListener("click", () => {
song.play();
}, { once:true });
});
}

/* FLOWERS */
createFlowers();
}

/* FLOWERS */
function createFlowers(){
for(let i=0;i<15;i++){
spawn();
}
setInterval(spawn,500);
}

function spawn(){
let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌼";

f.style.left=Math.random()*100+"vw";
f.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(f);
setTimeout(()=>f.remove(),9000);
}

/* ENVELOPE */
let opened=false;

function openLetter(){

if(opened) return;
opened=true;

const env=document.getElementById("env");
env.classList.add("open");

let msgs=["m1","m2","m3"];

msgs.forEach((id,i)=>{
setTimeout(()=>{
document.getElementById(id).classList.add("show");
},1200*(i+1));
});

/* FINAL MESSAGE */
setTimeout(()=>{

document.getElementById("finalMsg").innerHTML =
`শুভ নববর্ষ ${userName} 🌸<br>(Happy New Year ${userName})`;

document.getElementById("finalMsg").classList.add("show");

},1200*msgs.length + 1200);

}

</script>

</body>
</html>
