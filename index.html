<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shubho Nobo Borsho</title>

<meta property="og:title" content="শুভ নববর্ষ">
<meta property="og:description" content="Tap to open a Bengali New Year letter 🌸">
<meta property="og:image" content="https://aineshray003.github.io/nobo-borsho/preview.jpg">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
font-family:'Noto Serif Bengali',serif;
overflow:hidden;
background:url("preview.jpg") center/cover no-repeat;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(255,255,255,0.75);
}

#landing{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2;
}

button{
padding:14px 28px;
font-size:18px;
background:#b22222;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#greeting{
display:none;
height:100vh;
justify-content:center;
align-items:center;
}

.card{
background:#fffaf0;
padding:40px;
width:420px;
border:3px solid #b22222;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.envelope{
width:120px;
height:80px;
margin:20px auto;
background:#b22222;
cursor:pointer;
position:relative;
}

.envelope:before{
content:"";
position:absolute;
border-left:60px solid transparent;
border-right:60px solid transparent;
border-top:40px solid #8b0000;
top:0;
left:0;
transition:1s;
transform-origin:top;
}

.open:before{
transform:rotateX(180deg);
}

.message{
opacity:0;
transition:1s;
margin-top:12px;
}

.show{
opacity:1;
}

.final{
font-size:26px;
color:#b22222;
}

.flower{
position:absolute;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<audio id="dhaak" src="dhaak.mp3"></audio>
<audio id="song" src="rabindra.mp3" loop></audio>

<div id="landing">

<h2>নমস্কার 🙏</h2>
<p>Ready for some Poila Boishakh vibe?</p>

<button onclick="startGreeting()">Click Here</button>

</div>

<div id="greeting">

<div class="card">

<p>
নমস্কার প্রিয়জন<br>
(Nomoshkaar Priyojon)
</p>

<p>
বড়দেরকে প্রণাম, ছোটদেরকে ভালোবাসা
</p>

<p>Tap the letter 💌</p>

<div id="env" class="envelope" onclick="openLetter()"></div>

<div id="m1" class="message">নতুন আলো আসুক জীবনে</div>
<div id="m2" class="message">হাসি আর ভালোবাসা থাকুক</div>
<div id="m3" class="message">স্বপ্নগুলো হোক আরও বড়</div>

<div id="m4" class="message final">
শুভ নববর্ষ 🌸
</div>

</div>

</div>

<script>

let dhaak=document.getElementById("dhaak")
let song=document.getElementById("song")

function startGreeting(){

dhaak.volume=0.2
dhaak.currentTime=275
dhaak.play()

setTimeout(function(){

let fade=setInterval(function(){

if(dhaak.volume>0.02){
dhaak.volume-=0.02
}else{
dhaak.pause()
clearInterval(fade)
}

},120)

},3000)

document.getElementById("landing").style.display="none"
document.getElementById("greeting").style.display="flex"

}

let opened=false

function openLetter(){

if(opened) return
opened=true

document.getElementById("env").classList.add("open")

song.volume=0.35
song.currentTime=42
song.play()

let ids=["m1","m2","m3","m4"]

ids.forEach((id,i)=>{
setTimeout(()=>{
document.getElementById(id).classList.add("show")
},1500*(i+1))
})

setTimeout(()=>{
document.getElementById("env").classList.remove("open")
},8000)

}

for(let i=0;i<15;i++){

let f=document.createElement("div")

f.className="flower"
f.innerHTML="🌼"

f.style.left=Math.random()*100+"vw"
f.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(f)

}

</script>

</body>
</html>
